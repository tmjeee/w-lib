name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Allows manually triggering CI from the Actions tab (useful for debugging)
  workflow_dispatch:

jobs:
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test
